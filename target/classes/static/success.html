<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Submission Confirmed — IITD Data Portal" />
  <title>Success</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="/form.html" class="nav-brand">
      <span class="nav-brand-icon">📋</span>
      IITD - Assignment
    </a>
    <div class="nav-actions">
      <div class="nav-user-badge">
        <span class="nav-dot"></span>
        <span id="navUserEmail">User</span>
      </div>
      <button id="logoutBtn" class="btn btn-outline" style="padding:0.4rem 0.85rem;font-size:0.8rem;">
        Logout
      </button>
    </div>
  </nav>

  <div class="content-wrapper">

    <div class="section-card">
      <div class="success-container">

        <div class="success-icon-ring">✅</div>
        <h1 class="success-title">Submission Successful!</h1>
        <p class="success-text">Your details have been saved. You can download a PDF summary below.</p>

        <div class="detail-grid" id="detailGrid">
          <div class="detail-card">
            <div class="detail-label">Full Name</div>
            <div class="detail-value" id="detailName">—</div>
          </div>
          <div class="detail-card">
            <div class="detail-label">Email Address</div>
            <div class="detail-value" id="detailEmail">—</div>
          </div>
          <div class="detail-card" style="grid-column: 1 / -1;">
            <div class="detail-label">Mobile Number</div>
            <div class="detail-value" id="detailMobile">—</div>
          </div>
        </div>

        <div id="downloadAlert" class="alert" style="max-width:440px;width:100%;"></div>

        <div class="success-actions">
          <button id="downloadPdfBtn" class="btn btn-success">
            <span class="btn-spinner"></span>
            <span class="btn-text">Download My Details</span>
          </button>
          <a href="/form.html" class="btn btn-secondary">Submit Again</a>
        </div>

      </div>
    </div>

  </div>

  <script src="/js/app.js"></script>
  <script>
    (async function () {
      try {
        const res  = await fetch('/api/auth/status', { credentials: 'include' });
        const data = await res.json();
        if (!data.authenticated) { window.location.href = '/index.html'; return; }
        document.getElementById('navUserEmail').textContent = data.email || '';
      } catch (_) { window.location.href = '/index.html'; }
    })();

    (function () {
      const raw = sessionStorage.getItem('submissionData');
      if (!raw) return;
      try {
        const d = JSON.parse(raw);
        document.getElementById('detailName').textContent   = d.fullName || '—';
        document.getElementById('detailEmail').textContent  = d.email    || '—';
        document.getElementById('detailMobile').textContent = d.mobile   || '—';
      } catch (_) {}
    })();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
      sessionStorage.clear();
      window.location.href = '/index.html';
    });

    document.getElementById('downloadPdfBtn').addEventListener('click', async function () {
      const btn   = this;
      const alert = document.getElementById('downloadAlert');
      btn.classList.add('btn-loading'); btn.disabled = true;
      alert.className = 'alert';

      try {
        const res = await fetch('/api/user/download-pdf', { credentials: 'include' });
        if (!res.ok) throw new Error(res.status === 404 ? 'No submission found.' : 'Failed to generate PDF.');

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = 'my-details.pdf';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);

        alert.textContent = 'PDF downloaded successfully!';
        alert.classList.add('alert-success', 'visible');
      } catch (err) {
        alert.textContent = err.message;
        alert.classList.add('alert-error', 'visible');
      } finally {
        btn.classList.remove('btn-loading'); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
